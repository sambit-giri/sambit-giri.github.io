          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
             {[
               { title: "BCemu", link: "https://github.com/sambit-giri/BCemu", badge: "ML/Emulator", desc: "Machine learning emulator for modelling baryonic effects in cosmological simulations." },
               { title: "Tools21cm", link: "https://tools21cm.readthedocs.io/", badge: "Analysis", desc: "Analysis of 21-cm signals from EoR & Cosmic Dawn." },
               { title: "CosmoSpectra", link: "https://github.com/sambit-giri/cosmospectra", badge: "Fourier", desc: "Package for Fourier analysis (power spectrum, bispectrum) of simulations." },
               { title: "BEoRN", link: "https://github.com/cosmic-reionization/BEoRN", badge: "Simulation", desc: "Fast & flexible code for Epoch of Reionization." },
               { title: "AstronomyCalc", link: "https://github.com/sambit-giri/AstronomyCalc", badge: "Education", desc: "Tools for teaching astronomical calculations." },
               { title: "pyC2Ray", link: "https://github.com/cosmic-reionization/pyC2Ray", badge: "GPU", desc: "GPU-accelerated radiative transfer framework." }
             ].map((code, i) => (
               <a key={i} href={code.link} target="_blank" className="block p-6 bg-slate-800/50 hover:bg-slate-800 border border-slate-700 hover:border-amber-500/50 rounded-xl transition-all duration-300 group">
                 <div className="flex justify-between items-start mb-3">
                   <h3 className="font-bold text-amber-100 group-hover:text-amber-400 flex items-center gap-2">
                     {code.title} <Icons.ExternalLink size={14} className="opacity-0 group-hover:opacity-100 transition-opacity" />
                   </h3>
                   <span className="text-[10px] font-mono py-1 px-2 rounded bg-slate-900 text-slate-400 border border-slate-800">{code.badge}</span>
                 </div>
                 <p className="text-sm text-slate-400">{code.desc}</p>
               </a>
             ))}
          </div>

          <h3 className="text-xl font-bold text-slate-200 mb-6 border-b border-slate-800 pb-2">Jupyter Notebooks</h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
             {[
               'Model Universes', 'Hubble Diagram', 'Galaxy Rotation Curves', 'Bayesian Inference'
             ].map((nb, i) => (
               <div key={i} className="flex items-center justify-between p-4 bg-slate-900/50 border border-slate-800 rounded-lg">
                 <span className="font-medium text-slate-300">{nb}</span>
                 <div className="flex gap-2">
                   <span className="text-xs px-2 py-1 bg-slate-800 rounded text-slate-400">Colab</span>
                   <span className="text-xs px-2 py-1 bg-slate-800 rounded text-slate-400">Binder</span>
                 </div>
               </div>
             ))}
          </div>
        </div>
      );

      const CVSection = () => (
        <div className="animate-fade-in max-w-3xl mx-auto">
          <div className="text-center mb-10">
            <a href="data/sambit_curriculum_vitae.pdf" target="_blank" className="inline-flex items-center gap-3 px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold shadow-lg shadow-blue-500/20 transition-all transform hover:-translate-y-1">
              <Icons.Download size={20} /> Download PDF Resume
            </a>
          </div>

          <div className="space-y-8 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-700 before:to-transparent">
             {[
               { year: "2022 - Now", role: "Nordita Fellow", org: "Nordic Institute for Theoretical Physics" },
               { year: "2020 - 2022", role: "Postdoctoral Researcher", org: "University of Zurich" },
               { year: "2019 - 2020", role: "Postdoctoral Researcher", org: "Stockholm University" },
               { year: "2015 - 2019", role: "PhD in Astronomy", org: "Stockholm University" },
               { year: "2010 - 2015", role: "M.Tech Engineering Physics", org: "IIT (BHU), Varanasi" }
             ].map((item, i) => (
               <div key={i} className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group">
                  <div className="flex items-center justify-center w-10 h-10 rounded-full border border-slate-700 bg-slate-900 group-hover:border-blue-500 shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 text-slate-500 group-hover:text-blue-400 transition-colors">
                    <div className="w-3 h-3 bg-current rounded-full"></div>
                  </div>
                  <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] bg-slate-800/40 p-6 rounded-xl border border-slate-700 hover:border-blue-500/30 transition-all">
                     <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-1">
                       <h3 className="font-bold text-slate-200">{item.role}</h3>
                       <span className="text-xs font-mono text-blue-400">{item.year}</span>
                     </div>
                     <p className="text-sm text-slate-400">{item.org}</p>
                  </div>
               </div>
             ))}
          </div>
        </div>
      );

      const ContactSection = () => (
        <div className="animate-fade-in max-w-2xl mx-auto">
          <div className="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-xl mb-8">
            <div className="flex items-center gap-6 mb-8">
              <div className="w-16 h-16 bg-blue-500/10 rounded-full flex items-center justify-center text-blue-400 shrink-0">
                <Icons.Mail size={32} />
              </div>
              <div>
                <h3 className="text-xl font-bold text-slate-100">Get in Touch</h3>
                <p className="text-slate-400 mt-1">Open for collaborations and queries.</p>
              </div>
            </div>
            
            <div className="space-y-4">
              <div className="flex items-center gap-4 p-4 bg-slate-900/50 rounded-lg border border-slate-800">
                 <Icons.MapPin className="text-slate-500" />
                 <p className="text-sm text-slate-300">Stockholm University, Roslagstullsbacken 21, SE-106 91 Stockholm</p>
              </div>
              <div className="flex items-center gap-4 p-4 bg-slate-900/50 rounded-lg border border-slate-800">
                 <Icons.Mail className="text-slate-500" />
                 <p className="text-sm text-slate-300 font-mono">sambit.giri [at] su.se</p>
              </div>
            </div>
          </div>
        </div>
      );

      // --- MAIN APP ---

      const App = () => {
        const [activeView, setActiveView] = useState('menu'); 
        const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

        const renderContent = () => {
          switch (activeView) {
            case 'menu': return <MenuGrid onViewChange={setActiveView} />;
            case 'about': return <AboutSection />;
            case 'research': return <ResearchSection />;
            case 'papers': return <PapersSection />;
            case 'codes': return <CodesSection />;
            case 'cv': return <CVSection />;
            case 'contact': return <ContactSection />;
            default: return <MenuGrid onViewChange={setActiveView} />;
          }
        };

        const getTitle = () => {
          switch (activeView) {
            case 'about': return 'About Me';
            case 'research': return 'Cosmology & AI';
            case 'papers': return 'Publications';
            case 'codes': return 'ML Software';
            case 'cv': return 'Curriculum Vitae';
            case 'contact': return 'Contact';
            default: return '';
          }
        };

        return (
          <div className="min-h-screen bg-slate-950 text-slate-300 font-sans selection:bg-blue-500/30 overflow-hidden flex">
            
            <ProfileSidebar 
              activeView={activeView} 
              setActiveView={setActiveView} 
              mobileMenuOpen={mobileMenuOpen}
              setMobileMenuOpen={setMobileMenuOpen}
            />

            <main className="flex-1 lg:ml-72 h-screen overflow-y-auto relative bg-slate-950">
              
              <div className="lg:hidden absolute top-4 left-4 z-40">
                 <button onClick={() => setMobileMenuOpen(true)} className="p-2 bg-slate-800 rounded-md text-slate-200 border border-slate-700">
                   <Icons.Menu size={24} />
                 </button>
              </div>

              <div className="min-h-full p-6 md:p-12 lg:p-16 flex flex-col">
                
                {activeView !== 'menu' && (
                  <div className="flex items-center justify-between mb-12 animate-fade-in">
                    <button 
                      onClick={() => setActiveView('menu')}
                      className="flex items-center gap-2 text-slate-400 hover:text-white transition-colors group px-4 py-2 rounded-lg hover:bg-slate-900"
                    >
                      <Icons.ArrowLeft size={20} className="group-hover:-translate-x-1 transition-transform" />
                      <span className="font-medium">Back to Menu</span>
                    </button>
                    
                    <h2 className="text-2xl md:text-3xl font-bold text-slate-100 hidden sm:block">
                      {getTitle()}
                    </h2>
                  </div>
                )}

                <div className="flex-1 flex flex-col justify-center">
                   {renderContent()}
                </div>

              </div>
            </main>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
